name: Docker Image Build Pipeline

on:
  push:
    branches:
      - '**'

  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build i2b2-webclient image
    runs-on: ubuntu-latest
    environment: dev
    timeout-minutes: 60

    env:
      IMAGE_TAG: ${{ github.ref_name }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Determine whether Docker credentials are available.
      # Public forks typically do not receive repository secrets.
      - name: Check Docker credentials
        id: check-secrets
        shell: bash
        run: |
          if [[ -n "${{ secrets.DOCKER_LOGIN_TOKEN }}" ]]; then
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate with Docker Registry
        if: steps.check-secrets.outputs.has_secrets == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HOST }}
          password: ${{ secrets.DOCKER_LOGIN_TOKEN }}

      - name: Build Docker image
        env:
          HAS_SECRETS: ${{ steps.check-secrets.outputs.has_secrets }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_HOST || 'localuser' }}
          DOCKER_REPOSITORY: ${{ secrets.DOCKER_REPO || 'i2b2' }}
        shell: bash
        run: |
          set -Eeuo pipefail

          echo "Building image tag: $IMAGE_TAG"
          echo "Docker credentials available: $HAS_SECRETS"

          test -d docker
          cd docker
          test -f create_docker_image.sh
          bash create_docker_image.sh "$IMAGE_TAG"